version: '3.8'

# Copy to docker-compose.yml and customize before deploying.
services:
  git-insider:
    build: .
    container_name: git-insider
    ports:
      - "3201:3201"
    env_file:
      - .env
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - NODE_ENV=production
      - PORT=3201
      - JWT_SECRET=change_me_in_production
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=change_me
      # SQLite (default)
      - DB_PATH=/usr/src/app/database/app.db
      # PostgreSQL (uncomment postgres service and set DATABASE_URL)
      # - DATABASE_URL=postgresql://gitinsider:gitinsider@postgres:5432/gitinsider
    volumes:
      - ./database:/usr/src/app/database
      - ./repos:/usr/src/app/repos
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: git-insider-postgres
    profiles:
      - postgres
    environment:
      POSTGRES_USER: gitinsider
      POSTGRES_PASSWORD: gitinsider
      POSTGRES_DB: gitinsider
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitinsider -d gitinsider"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  default:
    name: git-insider-network
